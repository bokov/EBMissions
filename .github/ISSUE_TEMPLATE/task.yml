name: Task
description: Plan a bounded coding task with explicit acceptance criteria.
title: "task: "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        Use this form for implementation tasks that should be actionable for both humans and coding agents.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be accomplished?
      placeholder: Implement the behavior or cleanup that is needed.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this work needed now?
      placeholder: Link related issues, docs, bugs, or conversations.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: In scope
      description: What should this task include?
      placeholder: List the concrete work items that belong in this task.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What should explicitly not be done as part of this task?
      placeholder: Note adjacent work that should stay untouched.
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: The conditions that must be true before this task is done.
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2
        - [ ] Tests or validation updated
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation steps
      description: How should a contributor or coding agent prove the task is complete?
      placeholder: Provide exact commands, expected files, or screenshots if relevant.
    validations:
      required: true
  - type: input
    id: files
    attributes:
      label: Likely files or areas
      description: Optional hint for likely files or directories to inspect.
      placeholder: main.R, R/ebmissions_core.R, tests/testthat/
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
