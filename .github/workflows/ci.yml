name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libglpk-dev \
            libgmp3-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          cache-version: 1
          packages: |
            any::testthat
            any::rio
            any::tidyverse
            any::vctrs
            any::igraph
            any::svglite
            any::shinyjs
            any::bslib
            any::cookies
            any::googlesheets4
            any::ggplot2
            any::sessioninfo

      - name: Run unit tests
        run: |
          Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary")'

      - name: Run script smoke test
        run: |
          Rscript main.R --seed=42 --output=ci-output
          test -f ci-output/graph.dot
          test -f ci-output/graph.svg
          test -f ci-output/clue_graph.csv
